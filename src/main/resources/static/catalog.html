<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FurniStyle — Оформление заказа</title>

  <link rel="stylesheet" href="/catalog.css" />
</head>
<body>
  <header class="app-header">
    <div class="container header-row">
      <div class="brand">
        <div class="brand-title">FurniStyle</div>
        <div class="brand-subtitle">Оформление заказа • внутренняя система</div>
      </div>

      <div class="status-card">
        <div class="status-line">
          <span class="muted">Статус</span>
          <span id="statusBadge" class="badge badge-neutral">Нет активного заказа</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container layout">
    <section class="panel">
      <div class="panel-header">
        <div>
          <h2 class="panel-title">Каталог</h2>
        </div>

        <div class="panel-actions">
          <label class="field field-inline">
            <span class="field-label">Поиск</span>
            <input id="catalogSearch" class="input" type="search" placeholder="Название или категория…" />
          </label>
        </div>
      </div>

      <div class="catalog-head">
        <div>Название</div>
        <div>Категория</div>
        <div class="num">Цена</div>
        <div class="num">На складе</div>
      </div>

      <div id="catalogList" class="catalog-grid"></div>
    </section>

    <aside class="sidebar">
      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">Клиент</h2>
          </div>
        </div>

        <form id="clientForm" class="form">
          <div class="grid-2">
            <label class="field">
              <span class="field-label">Имя</span>
              <input id="clientName" class="input" type="text" pattern="([A-Za-zА-Яа-яёЁ]+){1,2,3}?" placeholder="Иван Иванов" required />
            </label>

            <label class="field">
              <span class="field-label">Телефон</span>
              <input id="clientPhone" class="input" type="tel" pattern="(\+7|8)\s?\(?[0-9]{3}\)?\s?[0-9]{3}-?[0-9]{2}-?[0-9]{2}" placeholder="+7 (___) ___-__-__" required />
            </label>
          </div>

          <div class="form-row">
            <button id="createOrderBtn" class="btn btn-primary" type="submit">
              Создать заказ
            </button>

            <div id="orderMeta" class="meta">
            </div>
          </div>

          <div id="formError" class="alert alert-error" hidden></div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">Корзина</h2>
          </div>

          <div class="pill-group" aria-label="Сводка корзины">
            <span class="pill"><span class="muted">Позиций</span> <b id="cartCount">0</b></span>
            <span class="pill"><span class="muted">Итого</span> <b id="cartTotal">—</b></span>
          </div>
        </div>

        <div id="cartList" class="cart-list"></div>

        <div class="cart-footer">
          <button id="confirmBtn" class="btn btn-success" type="button" disabled>
            Подтвердить заказ
          </button>
          <button id="cancelBtn" class="btn btn-danger" type="button" disabled>
            Отменить
          </button>

          <div id="cartError" class="alert alert-error" hidden></div>
        </div>
      </section>
    </aside>
  </main>

  <div id="toast" class="toast" aria-live="polite" aria-atomic="true" hidden>
    <div class="toast-inner">
      <div id="toastTitle" class="toast-title">Готово</div>
      <div id="toastText" class="toast-text">Сообщение</div>
    </div>
  </div>

  <script src="/catalog.js"></script>
</body>
</html>
